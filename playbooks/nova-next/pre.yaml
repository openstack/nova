- hosts: all
  tasks:
    - name: Install qemu-system-modules-spice for SPICE graphics support
      become: yes
      apt:
        name: qemu-system-modules-spice
        state: present
        update_cache: yes
      when: ansible_os_family == 'Debian'

- hosts: controller
  tasks:
    - name: create local.sh
      become: yes
      blockinfile:
        path: /opt/stack/devstack/local.sh
        create: True
        mode: 0777
        block: |
          #!/bin/bash
          set -x
          image_ids=$(openstack image list -f value -c ID)

          echo "Setting required image metadata properties"
          for image_id in $image_ids; do
              openstack image set --property hw_scsi_model=virtio-scsi ${image_id}
          done
          openstack image list
