---
features:
  - |
    The websocketproxy (``nova-novncproxy``, ``nova-serialproxy``, and
    ``nova-spicehtml5proxy``) can now be run in native threading mode instead
    of with eventlet. This is an experimental feature that is disabled by
    default. Please read the
    ``concurrency`` guide for more details:
    `<https://docs.openstack.org/nova/latest/admin/concurrency.html>`__

