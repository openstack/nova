---
fixes:
  - |
    However, nova metadata handler rejects a proxied metadata request if wrong
    signature was used for the request, but it logged the expected signature.
    This is now fixed and the expected signature is not present in the warning
    anymore. In case of concerns regarding the logged signature, it is advised
    to replace ``metadata_proxy_shared_secret`` in nova and neutron
    configuration.
    See `bug #2150094`_ description for more details.

    .. _`bug #2150094`: https://bugs.launchpad.net/nova/+bug/2150094
